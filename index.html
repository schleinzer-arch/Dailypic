<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONE FRAME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: #FAF9F7;
      color: #0F0F0F;
      transition: background 0.35s ease, color 0.35s ease;
      min-height: 100vh;
    }
    body.dark { background: #0F0F0F; color: #F0EDE8; }
    button { -webkit-tap-highlight-color: transparent; cursor: pointer; }

    /* ── Layout ── */
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      border-bottom: 1px solid #EDEAE5;
      transition: border-color 0.35s ease;
    }
    body.dark header { border-color: #222; }

    #logo {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      font-weight: 600;
    }

    /* ── Filter Bar ── */
    #filter-bar {
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .filter-btn {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 0.06em;
      font-weight: 400;
      color: #999;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s ease, font-weight 0.1s ease;
    }
    .filter-btn.active { font-weight: 600; color: #0F0F0F; }
    body.dark .filter-btn { color: #888; }
    body.dark .filter-btn.active { color: #FAF9F7; }
    .filter-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc;
      display: inline-block;
      transition: background 0.3s ease;
    }
    .filter-btn.active .filter-dot { background: #F2C94C; }

    /* ── Dark toggle ── */
    #dark-toggle {
      background: none;
      border: none;
      font-size: 14px;
      color: #999;
      padding: 0;
      transition: color 0.2s;
    }
    body.dark #dark-toggle { color: #666; }

    /* ── Mobile filter strip ── */
    #mobile-filter {
      display: none;
      padding: 16px 24px;
      border-bottom: 1px solid #EDEAE5;
      justify-content: center;
      transition: border-color 0.35s ease;
    }
    body.dark #mobile-filter { border-color: #222; }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 40px 40px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Challenge ── */
    #challenge {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #challenge.hidden {
      opacity: 0;
      transform: translateY(10px);
    }

    .label-tiny {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: #B0A99A;
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
      transition: color 0.35s ease;
    }
    body.dark .label-tiny { color: #555; }

    #headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(34px, 4.5vw, 56px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: #0F0F0F;
      text-align: center;
      max-width: 700px;
      margin: 0 auto;
      transition: color 0.35s ease;
    }
    body.dark #headline { color: #F0EDE8; }
    #headline .accent { /* color set dynamically */ }

    /* ── Motto ── */
    #motto-wrap {
      text-align: center;
      margin-top: 28px;
    }
    #motto-quote {
      font-size: 20px;
      color: #F2C94C;
      margin-bottom: 6px;
    }
    #motto-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: #B0A99A;
      margin-bottom: 8px;
      text-transform: uppercase;
      transition: color 0.35s ease;
    }
    body.dark #motto-label { color: #555; }
    #motto-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #0F0F0F;
      transition: color 0.35s ease;
    }
    body.dark #motto-text { color: #F0EDE8; }

    /* ── Meta Row (desktop) ── */
    #meta-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid #E8E5E0;
      border-bottom: 1px solid #E8E5E0;
      padding: 20px 0;
      margin-top: 36px;
      transition: border-color 0.35s ease;
    }
    body.dark #meta-row { border-color: #333; }
    .meta-cell {
      padding: 0 20px;
      border-right: 1px solid #E8E5E0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.35s ease;
    }
    body.dark .meta-cell { border-color: #333; }
    .meta-cell:last-child { border-right: none; }
    .meta-icon-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #B0A99A;
      transition: color 0.35s ease;
    }
    body.dark .meta-icon-row { color: #555; }
    .meta-cell-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      color: #B0A99A;
      text-transform: uppercase;
      transition: color 0.35s ease;
    }
    body.dark .meta-cell-label { color: #555; }
    .meta-cell-value {
      font-size: 13px;
      font-weight: 500;
      color: #1A1A1A;
      transition: color 0.35s ease;
    }
    body.dark .meta-cell-value { color: #E5E0D8; }
    .meta-cell-sub {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
      transition: color 0.35s ease;
    }
    body.dark .meta-cell-sub { color: #666; }
    .color-dot {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }

    /* ── Meta Row (mobile) ── */
    #meta-mobile {
      display: none;
      margin-top: 32px;
      border-top: 1px solid #E8E5E0;
      transition: border-color 0.35s ease;
    }
    body.dark #meta-mobile { border-color: #333; }
    .meta-mobile-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid #F0EDE8;
      transition: border-color 0.35s ease;
    }
    body.dark .meta-mobile-row { border-color: #2A2A2A; }
    .meta-mobile-left {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #B0A99A;
    }
    body.dark .meta-mobile-left { color: #555; }
    .meta-mobile-right { text-align: right; }

    /* ── Tip ── */
    #tip-box {
      margin-top: 28px;
      padding: 20px 0;
      text-align: center;
    }
    #tip-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      color: #B0A99A;
      margin-bottom: 10px;
      text-transform: uppercase;
      transition: color 0.35s ease;
    }
    body.dark #tip-label { color: #555; }
    #tip-text {
      font-size: 14px;
      line-height: 1.7;
      color: #777;
      max-width: 400px;
      margin: 0 auto;
      font-style: italic;
      transition: color 0.35s ease;
    }
    body.dark #tip-text { color: #888; }

    /* ── Generate Button ── */
    #gen-wrap { text-align: center; margin-top: 40px; }
    #gen-btn {
      background: #0F0F0F;
      border: 1px solid #0F0F0F;
      border-radius: 50%;
      width: 72px; height: 72px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #F2C94C;
      transition: transform 0.15s ease, background 0.2s ease;
    }
    body.dark #gen-btn { background: #1A1A1A; border-color: #444; box-shadow: 0 0 0 1px #333; }
    #gen-btn:hover { background: #2A2A2A; }
    body.dark #gen-btn:hover { background: #222; }
    #gen-btn:active { transform: scale(0.93); }
    #gen-label {
      margin-top: 12px;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: #999;
      transition: color 0.35s ease;
    }
    body.dark #gen-label { color: #555; }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      border-top: 1px solid #EDEAE5;
      transition: border-color 0.35s ease;
    }
    body.dark footer { border-color: #222; }
    .footer-text {
      font-size: 10px;
      color: #C0B9B0;
      transition: color 0.35s ease;
    }
    body.dark .footer-text { color: #444; }
    .footer-italic { font-style: italic; }

    /* ── Responsive ── */
    @media (max-width: 699px) {
      header { padding: 20px 24px; }
      #desktop-filter { display: none !important; }
      #mobile-filter { display: flex !important; }
      main { padding: 40px 24px 24px; max-width: 100%; }
      #headline { font-size: clamp(26px, 7vw, 36px); }
      #meta-row { display: none !important; }
      #meta-mobile { display: block !important; }
      footer { padding: 16px 24px; }
    }
  </style>
</head>

  <!-- Header -->

<script>
// ═══════════════════════════════════════════════════════════════════════════

// ── Motive ─────────────────────────────────────────────────────────────────

    "Fotografiere mehrere Varianten, aber entscheide dich am Ende für das ruhigste Bild.",
    "Halte die Kamera ruhig und suche nach Wiederholungen im Bild.",
    "Beobachte erst, dann fotografiere. Das beste Bild entsteht oft im dritten Versuch.",
    "Lass eine Farbe dominieren und entferne alles, was ablenkt.",
  ],
};

// ── Filter-Gewichtungen ──────────────────────────────────────────────────────
const filterWeights = {
  zufall: {
    subjects, colors, perspectives, techniques,
  },
  minimal: {
    subjects: ["ein Detail", "eine leere Fläche", "eine Linie", "einen Schatten", "eine Textur", "ein Muster"],
    colors: colors.filter(c => ["Schwarzweiß", "Pastell", "eine dominante Farbe"].includes(c.label)),
    perspectives: ["streng symmetrisch", "mit viel negativem Raum", "auf Augenhöhe", "aus extremer Nähe"],
    techniques: techniques.filter(t => ["blur", "sharp", "softlight"].includes(t.key)),
  },
  technisch: {
    subjects,
    colors,
    perspectives,
    techniques: techniques.filter(t => ["blur","sharp","longexp","shortexp","highiso","mf","motion"].includes(t.key)),
  },
  story: {
    subjects: ["eine Bewegung","einen Moment des Wartens","eine Silhouette","etwas Alltägliches","eine Spur","eine Lichtquelle"],
    colors,
    perspectives: ["auf Augenhöhe","aus der Hüfte","aus extremer Nähe","durch etwas hindurch"],
    techniques: techniques.filter(t => ["blur","softlight","motion"].includes(t.key)),
  },
};

// ── Hilfsfunktionen ──────────────────────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getTip(key) {
  const pool = tipsByKey[key] || tipsByKey.default;
  return pick(pool);
}

function techniquePhrase(tech) {
  if (tech.label === "Offene Blende")   return "mit offener Blende";
  if (tech.label === "Lange Belichtung") return "mit langer Belichtung";
  return "mit " + tech.label.toLowerCase();
}

function generate(filter) {
  const w = filterWeights[filter];
  const color     = pick(w.colors);
  const technique = pick(w.techniques);
  return {
    subject:     pick(w.subjects),
    color,
    perspective: pick(w.perspectives),
    technique,
    format:      pick(formats),
    motto:       pick(mottos),
    tip:         getTip(technique.key),
  };
}

// ── DOM-Referenzen ───────────────────────────────────────────────────────────
const $challenge    = document.getElementById('challenge');
const $headline     = document.getElementById('headline');
const $mottoText    = document.getElementById('motto-text');
const $tipText      = document.getElementById('tip-text');

// desktop meta
const $colorDot     = document.getElementById('meta-color-dot');
const $colorVal     = document.getElementById('meta-color-val');
const $perspVal     = document.getElementById('meta-persp-val');
const $techVal      = document.getElementById('meta-tech-val');
const $techSub      = document.getElementById('meta-tech-sub');
const $fmtVal       = document.getElementById('meta-fmt-val');

// mobile meta
const $colorDotM    = document.getElementById('meta-color-dot-m');
const $colorValM    = document.getElementById('meta-color-val-m');
const $perspValM    = document.getElementById('meta-persp-val-m');
const $techValM     = document.getElementById('meta-tech-val-m');
const $techSubM     = document.getElementById('meta-tech-sub-m');
const $fmtValM      = document.getElementById('meta-fmt-val-m');

// ── Render ───────────────────────────────────────────────────────────────────
function render(c) {
  const fmt = c.format.replace("im ", "").replace("gedacht", "").trim();

  // Headline
  $headline.innerHTML =
    `Fotografiere heute <span class="accent" style="color:${c.color.hex}">${c.subject}</span> ${c.perspective} ${techniquePhrase(c.technique)}.`;

  // Motto
  $mottoText.textContent = c.motto;

  // Tip
  $tipText.textContent = c.tip;

  // Desktop meta
  $colorDot.style.background = c.color.hex;
  $colorVal.textContent      = c.color.label;
  $perspVal.textContent      = c.perspective;
  $techVal.textContent       = c.technique.label;
  $techSub.textContent       = c.technique.sub;
  $fmtVal.textContent        = fmt;

  // Mobile meta
  $colorDotM.style.background = c.color.hex;
  $colorValM.textContent      = c.color.label;
  $perspValM.textContent      = c.perspective;
  $techValM.textContent       = c.technique.label;
  $techSubM.textContent       = c.technique.sub;
  $fmtValM.textContent        = fmt;
}

// ── State ────────────────────────────────────────────────────────────────────
let currentFilter = 'zufall';

function roll(filter) {
  currentFilter = filter || currentFilter;
  $challenge.classList.add('hidden');
  setTimeout(() => {
    render(generate(currentFilter));
    $challenge.classList.remove('hidden');
  }, 280);
}

// ── Filter buttons ───────────────────────────────────────────────────────────
function setActiveFilter(id) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === id);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    setActiveFilter(f);
    roll(f);
  });
});

// ── Generate button ───────────────────────────────────────────────────────────
document.getElementById('gen-btn').addEventListener('click', () => roll());

// ── Dark Mode ────────────────────────────────────────────────────────────────
const $darkBtn = document.getElementById('dark-toggle');
let dark = false;
$darkBtn.addEventListener('click', () => {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  $darkBtn.textContent = dark ? '☀' : '◑';
});

// ── Spacebar shortcut ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    roll();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
render(generate('zufall'));
</script>
</body>
</html>
