<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONE FRAME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>

    /* ─────────────────────────────────────────────────────────────
       BASE
    ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F0EDE8;
      --ink:       #1C1917;
      --ink-muted: #6B6560;
      --ink-faint: #A8A39D;
      --accent:    #8B5E3C;
      --sep:       #D5D0C8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
      cursor: default;
      transition: background 0.6s ease;
      /* tap anywhere to generate */
      user-select: none;
    }

    /* ─────────────────────────────────────────────────────────────
       LAYOUT SHELL
    ───────────────────────────────────────────────────────────── */
    #shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 36px 52px 40px;
      max-width: 860px;
    }

    /* ─────────────────────────────────────────────────────────────
       LOGO
    ───────────────────────────────────────────────────────────── */
    #logo {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.24em;
      color: var(--ink-muted);
      text-transform: uppercase;
      margin-bottom: 0;
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────────────────────────
       MAIN CONTENT — vertically centered in remaining space
    ───────────────────────────────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 0 20px;
    }

    /* ─────────────────────────────────────────────────────────────
       PROMPT — the core sentence
       Fade + slight rise on transition
    ───────────────────────────────────────────────────────────── */
    #prompt-wrap {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #prompt-wrap.out {
      opacity: 0;
      transform: translateY(16px);
    }

    #prompt {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(38px, 6vw, 72px);
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 36px;
    }

    /* ─────────────────────────────────────────────────────────────
       SEPARATOR — short em-dash style line (from moodboard)
    ───────────────────────────────────────────────────────────── */
    .rule {
      width: 32px;
      height: 1.5px;
      background: var(--ink-muted);
      margin-bottom: 28px;
      opacity: 0.5;
    }

    /* ─────────────────────────────────────────────────────────────
       REFLECTION NOTE — the quiet tip
    ───────────────────────────────────────────────────────────── */
    #reflection {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 400;
      font-style: normal;
      line-height: 1.55;
      color: var(--ink-muted);
      max-width: 420px;
      margin-bottom: 52px;
    }

    /* ─────────────────────────────────────────────────────────────
       QUOTE BLOCK — occasional literary thought
       Only shown ~40% of the time
    ───────────────────────────────────────────────────────────── */
    #quote-block {
      margin-bottom: 64px;
      max-width: 400px;
    }
    #quote-block.hidden { display: none; }

    #quote-mark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 12px;
      opacity: 0.85;
    }

    #quote-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(15px, 1.8vw, 18px);
      font-weight: 400;
      font-style: italic;
      line-height: 1.65;
      color: var(--ink-muted);
      margin-bottom: 14px;
    }

    #quote-author {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }
    #quote-author::before { content: "— "; }

    /* ─────────────────────────────────────────────────────────────
       INTERACTION HINT — subtle arrow circle (from moodboard)
    ───────────────────────────────────────────────────────────── */
    #footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      padding-top: 8px;
    }

    #next-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--ink-muted);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 0.25s ease, transform 0.2s ease, border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #next-btn:hover { opacity: 0.85; transform: scale(1.06); }
    #next-btn:active { transform: scale(0.93); opacity: 1; }
    #next-btn svg { color: var(--ink); }

    /* small dot below button — pagination feel */
    #dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--ink);
      opacity: 0.2;
    }

    /* ─────────────────────────────────────────────────────────────
       MOOD TINT — very subtle background shift per prompt mood
       Applied via CSS custom property on #shell
    ───────────────────────────────────────────────────────────── */
    #shell { transition: background 0.8s ease; }

    /* ─────────────────────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #shell { padding: 28px 32px 32px; }
      #content { padding: 48px 0 16px; }
      #prompt { margin-bottom: 28px; }
      #reflection { margin-bottom: 40px; }
      #quote-block { margin-bottom: 48px; }
    }

    @media (max-width: 380px) {
      #shell { padding: 24px 24px 28px; }
    }

  </style>
</head>
<body>

<div id="shell">

  <!-- Logo -->
  <div id="logo">One Frame</div>

  <!-- Main content -->
  <div id="content">
    <div id="prompt-wrap">

      <!-- The prompt sentence -->
      <p id="prompt"></p>

      <!-- Short horizontal rule -->
      <div class="rule"></div>

      <!-- Reflective tip -->
      <p id="reflection"></p>

      <!-- Occasional literary quote -->
      <div id="quote-block">
        <div id="quote-mark">"</div>
        <p id="quote-text"></p>
        <span id="quote-author"></span>
      </div>

    </div>
  </div>

  <!-- Subtle interaction footer -->
  <div id="footer">
    <button id="next-btn" aria-label="Neue Aufgabe">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.4"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="13 6 19 12 13 18"/>
      </svg>
    </button>
    <div id="dot"></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════════════
  GENERATOR
  All data lives here. Add entries to any array to extend the app.
════════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── SUBJECTS ─────────────────────────────────────────────────────────────────
// What to photograph. Add new subjects freely.
const subjects = [
  "eine Spiegelung",
  "einen Schatten",
  "eine Linie",
  "eine Struktur",
  "eine Bewegung",
  "eine Lichtquelle",
  "ein Detail",
  "eine Silhouette",
  "ein Muster",
  "eine leere Fläche",
  "einen Übergang",
  "einen Kontrast",
  "eine Form",
  "etwas Alltägliches",
  "eine Textur",
];

// ── LIGHTINGS ────────────────────────────────────────────────────────────────
// Each entry: the phrase as it appears in the sentence + a mood key.
// mood key controls the subtle background tint.
const lightings = [
  { phrase: "im kalten Morgenlicht",   mood: "cold"    },
  { phrase: "im warmen Abendlicht",    mood: "warm"    },
  { phrase: "im Gegenlicht",           mood: "neutral" },
  { phrase: "im diffusen Licht",       mood: "neutral" },
  { phrase: "im Neonlicht",            mood: "cool"    },
  { phrase: "im künstlichen Licht",    mood: "neutral" },
  { phrase: "im harten Mittagslicht",  mood: "warm"    },
  { phrase: "im weichen Licht",        mood: "neutral" },
  { phrase: "im ersten Morgenlicht",   mood: "warm"    },
  { phrase: "im letzten Tageslicht",   mood: "warm"    },
];

// ── PERSPECTIVES ──────────────────────────────────────────────────────────────
// Add new perspectives below.
const perspectives = [
  "aus der Froschperspektive",
  "aus der Vogelperspektive",
  "auf Augenhöhe",
  "aus extremer Nähe",
  "durch etwas hindurch",
  "mit viel Abstand",
  "diagonal komponiert",
  "symmetrisch",
  "aus der Hüfte",
];

// ── COMPOSITIONS ──────────────────────────────────────────────────────────────
// Add new compositions below.
const compositions = [
  "mit viel negativem Raum",
  "mit Symmetrie",
  "mit diagonalen Linien",
  "mit minimalistischem Bildaufbau",
  "mit Vordergrund und Hintergrund",
  "mit Wiederholungen",
  "mit natürlichem Rahmen",
  "mit Isolation",
  "mit zentraler Komposition",
  "mit asymmetrischer Balance",
];

// ── REFLECTIONS ───────────────────────────────────────────────────────────────
// Quiet tips. Feel like handwritten notes, not instructions.
// Add new tips freely — keep them short and calm.
const reflections = [
  "Beobachte zuerst das Licht,\nbevor du fotografierst.",
  "Lass große Flächen leer und\nkonzentriere dich auf ein einziges Element.",
  "Suche nach ruhigen Formen\nund vermeide Ablenkungen.",
  "Achte darauf,\nwie Schatten das Bild verändern.",
  "Halte das Motiv klein\nund gib der Umgebung Raum.",
  "Geh näher als du denkst.\nDann noch einen Schritt weiter.",
  "Warte, bis das Licht\ngenau richtig liegt.",
  "Weniger ist fast immer mehr.",
  "Mach einen Schritt zurück.\nBeobachte das Ganze.",
  "Suche nach dem einen Moment\nder Stille im Bild.",
  "Atme einmal durch,\ndann drücke ab.",
  "Lass dich von Licht leiten,\nnicht von Motiven.",
];

// ── QUOTES ────────────────────────────────────────────────────────────────────
// Real quotes from photographers, writers, filmmakers.
// Shown approximately 40% of the time.
// NEVER use generated or fake quotes.
// Add new entries with { text, author }.
const quotes = [
  {
    text: "There are things nobody would see\nif I didn't photograph them.",
    author: "Diane Arbus",
  },
  {
    text: "I don't pay attention to the world\nenough except through my camera.",
    author: "Saul Leiter",
  },
  {
    text: "Photography is a way of feeling,\nof touching, of loving.",
    author: "Aaron Siskind",
  },
  {
    text: "I only know how to approach a place\nby walking.",
    author: "Saul Leiter",
  },
  {
    text: "A photograph is a secret\nabout a secret.",
    author: "Diane Arbus",
  },
  {
    text: "The camera is an excuse\nto be someplace you otherwise don't belong.",
    author: "Susan Meiselas",
  },
  {
    text: "Photography is not about cameras,\ngadgets and gizmos. It's about light and thought.",
    author: "Andreas Feininger",
  },
  {
    text: "I am always mentally photographing\neverything as practice.",
    author: "Minor White",
  },
  {
    text: "There is nothing worse\nthan a sharp image of a fuzzy concept.",
    author: "Ansel Adams",
  },
  {
    text: "The negative is the equivalent\nof the composer's score.",
    author: "Ansel Adams",
  },
  {
    text: "In photography there are no shadows\nthat cannot be illuminated.",
    author: "August Sander",
  },
  {
    text: "Light makes photography.\nEmbrace light. Admire it. Love it.",
    author: "George Eastman",
  },
  {
    text: "You don't take a photograph,\nyou make it.",
    author: "Ansel Adams",
  },
  {
    text: "The best thing about a picture\nis that it never changes,\neven when the people in it do.",
    author: "Andy Warhol",
  },
  {
    text: "To me, photography is an art\nof observation.",
    author: "Elliott Erwitt",
  },
];

// ── MOOD TINTS ────────────────────────────────────────────────────────────────
// Very subtle background color shift based on lighting mood.
// Keep all values extremely restrained.
const moodBg = {
  cold:    "#EBF0F2",  // soft blue-gray
  warm:    "#F2EDE5",  // warm beige
  cool:    "#EBEcF0",  // slightly cool
  neutral: "#F0EDE8",  // default off-white
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ~40% chance to show quote
function shouldShowQuote() {
  return Math.random() < 0.4;
}

// Build the complete prompt sentence.
// The sentence is intentionally structured as flowing lines,
// not labeled categories.
function buildPrompt(subject, lighting, perspective, composition) {
  // We compose lines that flow naturally together.
  // Not all four elements always appear — sometimes drop perspective for brevity.
  const includePerspective = Math.random() > 0.35;

  if (includePerspective) {
    return `Fotografiere heute\n${subject}\n${lighting.phrase}\n${composition}.`;
  } else {
    return `Fotografiere heute\n${subject}\n${lighting.phrase}\n${perspective}.`;
  }
}

// ── GENERATE ──────────────────────────────────────────────────────────────────
function generate() {
  const subject     = pick(subjects);
  const lighting    = pick(lightings);
  const perspective = pick(perspectives);
  const composition = pick(compositions);
  const reflection  = pick(reflections);
  const showQuote   = shouldShowQuote();
  const quote       = showQuote ? pick(quotes) : null;

  return {
    sentence: buildPrompt(subject, lighting, perspective, composition),
    reflection,
    quote,
    mood: lighting.mood,
  };
}

// ── DOM REFS ──────────────────────────────────────────────────────────────────
const $shell      = document.getElementById('shell');
const $wrap       = document.getElementById('prompt-wrap');
const $prompt     = document.getElementById('prompt');
const $reflection = document.getElementById('reflection');
const $quoteBlock = document.getElementById('quote-block');
const $quoteText  = document.getElementById('quote-text');
const $quoteAuth  = document.getElementById('quote-author');
const $nextBtn    = document.getElementById('next-btn');

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(data) {
  // Prompt: newlines become <br>
  $prompt.innerHTML = data.sentence
    .split('\n')
    .map((line, i) => i === 0 ? line : `<br>${line}`)
    .join('');

  // Reflection: newlines become <br>
  $reflection.innerHTML = data.reflection
    .split('\n')
    .map((line, i) => i === 0 ? line : `<br>${line}`)
    .join('');

  // Quote
  if (data.quote) {
    $quoteText.innerHTML = data.quote.text
      .split('\n')
      .map((line, i) => i === 0 ? line : `<br>${line}`)
      .join('');
    $quoteAuth.textContent = data.quote.author;
    $quoteBlock.classList.remove('hidden');
  } else {
    $quoteBlock.classList.add('hidden');
  }

  // Mood tint
  $shell.style.background = moodBg[data.mood] || moodBg.neutral;
  document.body.style.background = moodBg[data.mood] || moodBg.neutral;
}

// ── TRANSITION ────────────────────────────────────────────────────────────────
let busy = false;

function next() {
  if (busy) return;
  busy = true;

  $wrap.classList.add('out');

  setTimeout(() => {
    render(generate());
    $wrap.classList.remove('out');
    busy = false;
  }, 480);
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────

// Button click
$nextBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  next();
});

// Spacebar
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    next();
  }
  // Also allow right arrow
  if (e.code === 'ArrowRight') {
    next();
  }
});

// Tap anywhere on the content area (not the button, which already handles it)
document.getElementById('content').addEventListener('click', next);

// ── INIT ──────────────────────────────────────────────────────────────────────
render(generate());
</script>
</body>
</html>
