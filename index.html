<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONE FRAME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #F2F0EB;
      color: #1A1814;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.4s ease, color 0.4s ease;
      -webkit-font-smoothing: antialiased;
    }
    body.dark { background: #141210; color: #EDE9E0; }
    button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    svg { display: block; flex-shrink: 0; }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
    }
    #logo {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #1A1814;
      transition: color 0.4s;
    }
    body.dark #logo { color: #EDE9E0; }
    #header-right { display: flex; align-items: center; gap: 24px; }

    /* ── FILTER PILLS ── */
    .filter-group { display: flex; gap: 4px; align-items: center; }
    .filter-btn {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.03em;
      color: #999;
      padding: 6px 14px;
      border-radius: 20px;
      position: relative;
      transition: background 0.2s, color 0.2s;
    }
    .filter-btn.active { background: #1A1814; color: #F2F0EB; }
    body.dark .filter-btn { color: #555; }
    body.dark .filter-btn.active { background: #EDE9E0; color: #141210; }
    .filter-btn .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #C9A84C;
      position: absolute;
      bottom: 3px; left: 50%;
      transform: translateX(-50%);
      display: none;
    }
    .filter-btn.active .dot { display: block; }

    /* ── DARK TOGGLE ── */
    #dark-toggle {
      background: none; border: none;
      color: #AAA;
      display: flex; align-items: center; justify-content: center;
      padding: 4px;
      transition: color 0.2s;
    }
    #dark-toggle:hover { color: #1A1814; }
    body.dark #dark-toggle:hover { color: #EDE9E0; }

    /* ── MOBILE FILTER ── */
    #filter-mobile {
      display: none;
      padding: 0 24px 20px;
      gap: 4px;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 16px 48px 48px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── CHALLENGE FADE ── */
    #challenge {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.32s ease, transform 0.32s ease;
    }
    #challenge.out { opacity: 0; transform: translateY(14px); }

    /* ── EYEBROW ── */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .eyebrow-line {
      width: 28px; height: 1.5px;
      background: #C9A84C;
    }
    .eyebrow-text {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #999;
      text-transform: uppercase;
    }
    body.dark .eyebrow-text { color: #555; }

    /* ── HEADLINE ── */
    #headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(40px, 6.2vw, 72px);
      font-weight: 600;
      line-height: 1.12;
      letter-spacing: -0.01em;
      color: #1A1814;
      margin-bottom: 40px;
      transition: color 0.4s;
    }
    body.dark #headline { color: #EDE9E0; }
    #headline em { font-style: italic; font-weight: 400; }

    /* ── MOOD ── */
    #mood-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .mood-icon {
      color: #C9A84C;
      font-family: Georgia, serif;
      font-size: 26px;
      line-height: 1;
      margin-top: -6px;
    }
    #mood-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: #1A1814;
      text-transform: uppercase;
      transition: color 0.4s;
    }
    body.dark #mood-label { color: #EDE9E0; }

    /* ── TIP (desktop) ── */
    #tip-text {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      color: #5A5650;
      max-width: 360px;
      margin-bottom: 48px;
      transition: color 0.4s;
    }
    body.dark #tip-text { color: #888; }

    /* ── SEPARATOR ── */
    .sep {
      width: 100%; height: 1px;
      background: #DDD9D0;
      margin-bottom: 32px;
      transition: background 0.4s;
    }
    body.dark .sep { background: #292520; }

    /* ── META ROW (desktop) ── */
    #meta-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      margin-bottom: 52px;
    }
    .meta-cell { display: flex; flex-direction: column; gap: 7px; padding-right: 16px; }
    .meta-cell-icon { color: #AAA; transition: color 0.4s; }
    body.dark .meta-cell-icon { color: #555; }
    .meta-cell-label {
      font-size: 8px;
      letter-spacing: 0.16em;
      color: #BBB;
      text-transform: uppercase;
      font-weight: 500;
      transition: color 0.4s;
    }
    body.dark .meta-cell-label { color: #444; }
    .meta-cell-value {
      font-size: 13px;
      font-weight: 400;
      color: #1A1814;
      transition: color 0.4s;
    }
    body.dark .meta-cell-value { color: #C8C2B4; }

    /* ── META CARDS (mobile 2×2) ── */
    #meta-mobile {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 32px;
    }
    .meta-card {
      background: #E8E5DE;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.4s;
    }
    body.dark .meta-card { background: #1D1B18; }
    .meta-card-icon { color: #AAA; }
    body.dark .meta-card-icon { color: #444; }
    .meta-card-value {
      font-size: 13px;
      color: #1A1814;
      font-weight: 400;
      transition: color 0.4s;
    }
    body.dark .meta-card-value { color: #B8B2A4; }

    /* ── TIP (mobile) ── */
    #tip-mobile { display: none; margin-bottom: 40px; }
    .tip-label {
      font-size: 8px;
      letter-spacing: 0.18em;
      color: #BBB;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 10px;
      transition: color 0.4s;
    }
    body.dark .tip-label { color: #444; }
    .tip-body {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.7;
      color: #5A5650;
      transition: color 0.4s;
    }
    body.dark .tip-body { color: #777; }

    /* ── GENERATE BUTTON ── */
    #gen-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #gen-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #1A1814;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #C9A84C;
      box-shadow: 0 0 0 7px rgba(201,168,76,0.13);
      transition: transform 0.18s ease, box-shadow 0.2s ease, background 0.4s;
    }
    body.dark #gen-btn {
      background: #EDE9E0;
      box-shadow: 0 0 0 7px rgba(201,168,76,0.10);
    }
    #gen-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 0 12px rgba(201,168,76,0.16);
    }
    #gen-btn:active { transform: scale(0.93); }
    #gen-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      color: #BBB;
      text-transform: uppercase;
      transition: color 0.4s;
    }
    body.dark #gen-label { color: #444; }

    /* ── FOOTER ── */
    footer {
      display: flex;
      justify-content: space-between;
      padding: 24px 48px;
    }
    .f-quote {
      font-size: 10px;
      font-style: italic;
      color: #BBB;
      transition: color 0.4s;
    }
    body.dark .f-quote { color: #3A3632; }
    .f-tag {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #BBB;
      transition: color 0.4s;
    }
    body.dark .f-tag { color: #3A3632; }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      header { padding: 22px 24px 14px; }
      #filter-desktop { display: none !important; }
      #filter-mobile { display: flex !important; }
      main { padding: 4px 24px 40px; max-width: 100%; }
      #headline { font-size: clamp(34px, 9vw, 50px); margin-bottom: 24px; }
      #tip-text { display: none; }
      #mood-row { margin-bottom: 24px; }
      .sep { margin-bottom: 20px; }
      #meta-row { display: none; }
      #meta-mobile { display: grid; }
      #tip-mobile { display: block; }
      footer { padding: 18px 24px; }
    }

  </style>
</head>

               "Neonlicht und Nacht: halte nach Kontrasten zwischen Licht und Dunkel Ausschau."],
  artificial: ["Künstliches Licht erzeugt Farbstiche – nutze sie bewusst als Stilmittel.",
               "Achte auf die Mischung verschiedener Lichtquellen im selben Bild."],
  soft:       ["Weiches Licht verzeiht viel – konzentriere dich auf Komposition und Inhalt.",
               "Suche Fenster oder offene Schatten als natürliche Softboxen."],
  morning:    ["Morgenlicht ist kurz und kostbar – sei früh da, beobachte zuerst.",
               "Das erste Licht legt lange Schatten – nutze sie als Struktur im Bild."],
  evening:    ["Abendlicht ist warm und tief – suche Gegenlicht und lange Schatten.",
               "Die Stunde vor Sonnenuntergang gehört dir – nutze sie vollständig."],
  negative:   ["Lass große Flächen leer und reduziere das Bild auf ein einziges Element.",
               "Halte das Motiv klein im Bild und gib der Umgebung bewusst Raum."],
  frame:      ["Nutze Fenster, Türen oder Äste, um dein Motiv einzurahmen.",
               "Natürliche Rahmen leiten das Auge – suche sie aktiv im Bild."],
  close:      ["Aus extremer Nähe zeigen sich Texturen, die sonst unsichtbar bleiben.",
               "Geh näher als du denkst – und dann noch einen Schritt weiter."],
  through:    ["Nutze Reflexionen oder Glasflächen für zusätzliche Tiefe.",
               "Was liegt hinter dem Vordergrund? Nutze es als Bildebene."],
  sym:        ["Symmetrie wirkt stark – suche sie in Architektur, Wasser, Schatten.",
               "Ein winziger Versatz zerstört Symmetrie – sei präzise."],
  repeat:     ["Suche nach Wiederholungen und ruhigen Formen im Alltag.",
               "Muster entstehen oft erst, wenn man einen Schritt zurücktritt."],
  default:    [
    "Beobachte zuerst das Licht, bevor du fotografierst.",
    "Suche nach Linien, die dein Bild leiten.",
    "Lass den Himmel – oder eine große Fläche – Raum zum Atmen.",
    "Einfaches Motiv, starke Wirkung – reduziere, bis nichts mehr fehlt.",
    "Details erzählen oft die besten Geschichten.",
    "Mach einen Schritt zurück. Dann noch einen.",
    "Beobachte zuerst. Dann drücke ab.",
  ],
};

function getTip(lighting, perspective, composition) {
  const pool =
    tips[composition.key] ||
    tips[perspective.key]  ||
    tips[lighting.key]     ||
    tips.default;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── FILTER PRESETS ────────────────────────────────────────────────────────────
const filterPresets = {
  zufall:  { subjects, lightings, perspectives, compositions, moods },
  minimal: {
    subjects: ["ein Detail","eine leere Fläche","eine Linie","eine Struktur","eine Textur","ein Muster"],
    lightings: lightings.filter(l => ["soft","diffuse","cold","morning"].includes(l.key)),
    perspectives: perspectives.filter(p => ["eye","close","sym","far"].includes(p.key)),
    compositions: compositions.filter(c => ["negative","minimal","isolation","central"].includes(c.key)),
    moods: ["Ruhe","Stille","Ordnung","Distanz","Einsamkeit"],
  },
  story: {
    subjects: ["eine Bewegung","eine Silhouette","einen Übergang","etwas Alltägliches","einen Kontrast","eine Lichtquelle"],
    lightings: lightings.filter(l => ["morning","evening","warm","backlight","soft"].includes(l.key)),
    perspectives: perspectives.filter(p => ["eye","hip","frog","through"].includes(p.key)),
    compositions: compositions.filter(c => ["layers","frame","asymmetry","central","negative"].includes(c.key)),
    moods: ["Warten","Nostalgie","Einsamkeit","Melancholie","Spannung","Bewegung","Wärme"],
  },
  urban: {
    subjects: ["eine Spiegelung","eine Linie","eine Struktur","einen Kontrast","eine Lichtquelle","einen Schatten","eine Form"],
    lightings: lightings.filter(l => ["neon","artificial","hard","cold","backlight"].includes(l.key)),
    perspectives: perspectives.filter(p => ["bird","frog","diag","through","sym"].includes(p.key)),
    compositions: compositions.filter(c => ["symmetry","diagonal","repeat","central","layers"].includes(c.key)),
    moods: ["Urbanität","Spannung","Kälte","Chaos","Ordnung"],
  },
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generate(filterKey) {
  const f = filterPresets[filterKey];
  const lighting    = pick(f.lightings);
  const perspective = pick(f.perspectives);
  const composition = pick(f.compositions);
  return {
    subject: pick(f.subjects),
    lighting, perspective, composition,
    mood: pick(f.moods),
    tip: getTip(lighting, perspective, composition),
  };
}

// ── DOM REFS ──────────────────────────────────────────────────────────────────
const $ch       = document.getElementById('challenge');
const $headline = document.getElementById('headline');
const $moodLbl  = document.getElementById('mood-label');
const $tip      = document.getElementById('tip-text');

const $dLight = document.getElementById('d-light');
const $dPersp = document.getElementById('d-persp');
const $dComp  = document.getElementById('d-comp');
const $dMood  = document.getElementById('d-mood');

const $mLight = document.getElementById('m-light');
const $mPersp = document.getElementById('m-persp');
const $mComp  = document.getElementById('m-comp');
const $mMood  = document.getElementById('m-mood');
const $mTip   = document.getElementById('m-tip');

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(c) {
  // Headline: "[subject] / im [lighting (italic)] / [perspective] / [composition]."
  $headline.innerHTML =
    `${c.subject}<br><em>im ${c.lighting.label}</em><br>${c.perspective.label}<br>${c.composition.label}.`;

  $moodLbl.textContent = c.mood.toUpperCase();
  $tip.textContent = c.tip;

  // Desktop meta
  $dLight.textContent = c.lighting.short;
  $dPersp.textContent = c.perspective.short;
  $dComp.textContent  = c.composition.short;
  $dMood.textContent  = c.mood;

  // Mobile meta
  $mLight.textContent = c.lighting.short;
  $mPersp.textContent = c.perspective.short;
  $mComp.textContent  = c.composition.short;
  $mMood.textContent  = c.mood + "e Stimmung";
  $mTip.textContent   = c.tip;
}

// ── ROLL ─────────────────────────────────────────────────────────────────────
let currentFilter = 'zufall';

function roll(f) {
  if (f) currentFilter = f;
  $ch.classList.add('out');
  setTimeout(() => {
    render(generate(currentFilter));
    $ch.classList.remove('out');
  }, 330);
}

// ── FILTER BUTTONS ────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.f === btn.dataset.f)
    );
    roll(btn.dataset.f);
  });
});

// ── GENERATE BTN ─────────────────────────────────────────────────────────────
document.getElementById('gen-btn').addEventListener('click', () => roll());

// ── DARK MODE ─────────────────────────────────────────────────────────────────
let dark = false;
document.getElementById('dark-toggle').addEventListener('click', () => {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
});

// ── SPACEBAR ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault(); roll();
  }
});

// ── INIT ─────────────────────────────────────────────────────────────────────
render(generate('zufall'));
</script>
</body>
</html>
