<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAILY</title>

  <!-- PWA / Homescreen Icon -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="DAILY" />
  <meta name="theme-color" content="#0D0D0D" />

  <!-- Inline app icon as SVG favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230D0D0D'/><text y='67' x='50' text-anchor='middle' font-family='Georgia,serif' font-size='28' letter-spacing='6' fill='%23EDE0CC'>DAILY</text></svg>" />

  <!-- Apple Touch Icon: embedded as data URI (1024×1024 equivalent via SVG) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1024 1024'><rect width='1024' height='1024' rx='220' fill='%230D0D0D'/><text y='620' x='512' text-anchor='middle' font-family='Georgia,serif' font-size='280' letter-spacing='60' fill='%23EDE0CC'>DAILY</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>

    /* ─────────────────────────────────────────────────────────────
       BASE
    ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F0EDE8;
      --ink:        #1C1917;
      --ink-muted:  #6B6560;
      --ink-faint:  #AAA49D;
      --accent:     #8B5E3C;
      --sep:        #D0CBC3;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 0.8s ease;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
    }

    /* ─────────────────────────────────────────────────────────────
       SHELL
    ───────────────────────────────────────────────────────────── */
    #shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 36px 52px 36px;
      max-width: 820px;
    }

    /* ─────────────────────────────────────────────────────────────
       HEADER — logo + timer on same line
    ───────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
      margin-bottom: 0;
    }

    #logo {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.24em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    /* Timer — always visible, very quiet */
    #timer {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      font-variant-numeric: tabular-nums;
      /* so numbers don't jump in width */
      min-width: 72px;
      text-align: right;
    }

    /* ─────────────────────────────────────────────────────────────
       MAIN CONTENT
    ───────────────────────────────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 0 16px;
    }

    /* Fade transition */
    #prompt-wrap {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    #prompt-wrap.out {
      opacity: 0;
      transform: translateY(14px);
    }

    /* ─────────────────────────────────────────────────────────────
       PROMPT — the main sentence
    ───────────────────────────────────────────────────────────── */
    #prompt {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(36px, 5.8vw, 70px);
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 36px;
    }

    /* ─────────────────────────────────────────────────────────────
       RULE — short em-dash line
    ───────────────────────────────────────────────────────────── */
    .rule {
      width: 30px;
      height: 1.5px;
      background: var(--ink-muted);
      opacity: 0.4;
      margin-bottom: 26px;
    }

    /* ─────────────────────────────────────────────────────────────
       REFLECTION — quiet tip
    ───────────────────────────────────────────────────────────── */
    #reflection {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(15px, 1.9vw, 20px);
      font-weight: 400;
      line-height: 1.55;
      color: var(--ink-muted);
      max-width: 400px;
      margin-bottom: 52px;
    }

    /* ─────────────────────────────────────────────────────────────
       QUOTE BLOCK — always present in DAILY
    ───────────────────────────────────────────────────────────── */
    #quote-block {
      max-width: 400px;
    }

    #quote-mark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    #quote-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(14px, 1.75vw, 18px);
      font-weight: 400;
      font-style: italic;
      line-height: 1.65;
      color: var(--ink-muted);
      margin-bottom: 14px;
    }

    #quote-author {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }
    #quote-author::before { content: "— "; }

    /* ─────────────────────────────────────────────────────────────
       FOOTER — date indicator, very quiet
    ───────────────────────────────────────────────────────────── */
    #footer {
      flex-shrink: 0;
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    #date-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--ink-faint);
      opacity: 0.6;
    }

    /* Subtle dot — visual anchor like in the moodboard */
    #dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--ink);
      opacity: 0.15;
    }

    /* ─────────────────────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #shell   { padding: 28px 30px 28px; }
      #content { padding: 44px 0 12px; }
      #prompt  { margin-bottom: 28px; }
      #reflection { margin-bottom: 40px; }
    }

    @media (max-width: 380px) {
      #shell { padding: 24px 22px 22px; }
    }

  </style>
</head>
<body>

<div id="shell">

  <!-- Header: logo left, timer right -->
  <div id="header">
    <span id="logo">Daily</span>
    <span id="timer">—</span>
  </div>

  <!-- Main content -->
  <div id="content">
    <div id="prompt-wrap">

      <!-- The daily prompt -->
      <p id="prompt"></p>

      <!-- Short rule -->
      <div class="rule"></div>

      <!-- Quiet reflection -->
      <p id="reflection"></p>

      <!-- Quote — always shown in DAILY -->
      <div id="quote-block">
        <div id="quote-mark">"</div>
        <p id="quote-text"></p>
        <span id="quote-author"></span>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div id="footer">
    <span id="date-label"></span>
    <div id="dot"></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════════════
  GENERATOR & TIMER
  New prompt every day at 06:00 Vienna time.
  Seed is the current Vienna date string → same date = same prompt.
════════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ────────────────────────────────────────────────────────────────────────────
// DATA ARRAYS
// Add new entries freely. Seed picks deterministically so adding entries
// shifts future days but never breaks existing ones.
// ────────────────────────────────────────────────────────────────────────────

// SUBJECTS — what to photograph
const subjects = [
  "eine Spiegelung",
  "einen Schatten",
  "eine Linie",
  "eine Struktur",
  "eine Bewegung",
  "eine Lichtquelle",
  "ein Detail",
  "eine Silhouette",
  "ein Muster",
  "eine leere Fläche",
  "einen Übergang",
  "einen Kontrast",
  "eine Form",
  "etwas Alltägliches",
  "eine Textur",
];

// LIGHTINGS — how it is lit
// mood: controls subtle background tint (cold / warm / neutral / cool)
const lightings = [
  { phrase: "im kalten Morgenlicht",   mood: "cold"    },
  { phrase: "im warmen Abendlicht",    mood: "warm"    },
  { phrase: "im Gegenlicht",           mood: "neutral" },
  { phrase: "im diffusen Licht",       mood: "neutral" },
  { phrase: "im Neonlicht",            mood: "cool"    },
  { phrase: "im künstlichen Licht",    mood: "cool"    },
  { phrase: "im harten Mittagslicht",  mood: "warm"    },
  { phrase: "im weichen Licht",        mood: "neutral" },
  { phrase: "im ersten Morgenlicht",   mood: "warm"    },
  { phrase: "im letzten Tageslicht",   mood: "warm"    },
];

// PERSPECTIVES — how to look
const perspectives = [
  "aus der Froschperspektive",
  "aus der Vogelperspektive",
  "auf Augenhöhe",
  "aus extremer Nähe",
  "durch etwas hindurch",
  "mit viel Abstand",
  "diagonal komponiert",
  "symmetrisch",
  "aus der Hüfte",
];

// COMPOSITIONS — how to frame
const compositions = [
  "mit viel negativem Raum",
  "mit Symmetrie",
  "mit diagonalen Linien",
  "mit minimalistischem Bildaufbau",
  "mit Vordergrund und Hintergrund",
  "mit Wiederholungen",
  "mit natürlichem Rahmen",
  "mit Isolation",
  "mit zentraler Komposition",
  "mit asymmetrischer Balance",
];

// REFLECTIONS — quiet tips, one per prompt
// Keep them short, calm, almost handwritten in feel.
const reflections = [
  "Beobachte zuerst das Licht,\nbevor du fotografierst.",
  "Lass große Flächen leer und\nkonzentriere dich auf ein einziges Element.",
  "Suche nach ruhigen Formen\nund vermeide Ablenkungen.",
  "Achte darauf,\nwie Schatten das Bild verändern.",
  "Halte das Motiv klein\nund gib der Umgebung Raum.",
  "Geh näher als du denkst.\nDann noch einen Schritt weiter.",
  "Warte, bis das Licht\ngenau richtig liegt.",
  "Weniger ist fast immer mehr.",
  "Mach einen Schritt zurück.\nBeobachte das Ganze.",
  "Suche nach dem einen Moment\nder Stille im Bild.",
  "Atme einmal durch,\ndann drücke ab.",
  "Lass dich von Licht leiten,\nnicht von Motiven.",
  "Sieh zuerst. Denk dann.\nDrücke zuletzt ab.",
  "Nicht jede Aufnahme muss\netwas sagen. Manchmal genügt sie.",
];

// QUOTES — real quotes, always shown in DAILY.
// Only real, attributed quotes. Never generated.
// Preferred: photographers, writers, filmmakers.
const quotes = [
  {
    text: "There are things nobody would see\nif I didn't photograph them.",
    author: "Diane Arbus",
  },
  {
    text: "I don't pay attention to the world\nenough except through my camera.",
    author: "Saul Leiter",
  },
  {
    text: "Photography is a way of feeling,\nof touching, of loving.",
    author: "Aaron Siskind",
  },
  {
    text: "I only know how to approach a place\nby walking.",
    author: "Saul Leiter",
  },
  {
    text: "A photograph is a secret\nabout a secret.",
    author: "Diane Arbus",
  },
  {
    text: "The camera is an excuse\nto be someplace you otherwise don't belong.",
    author: "Susan Meiselas",
  },
  {
    text: "I am always mentally photographing\neverything as practice.",
    author: "Minor White",
  },
  {
    text: "There is nothing worse than\na sharp image of a fuzzy concept.",
    author: "Ansel Adams",
  },
  {
    text: "You don't take a photograph,\nyou make it.",
    author: "Ansel Adams",
  },
  {
    text: "To me, photography is an art\nof observation.",
    author: "Elliott Erwitt",
  },
  {
    text: "The best images are the ones\nthat retain their strength over time.",
    author: "Anne Geddes",
  },
  {
    text: "Light makes photography.\nEmbrace it. Admire it. Love it.",
    author: "George Eastman",
  },
  {
    text: "In photography, the smallest thing\ncan be a great subject.",
    author: "Henri Cartier-Bresson",
  },
  {
    text: "Your first 10,000 photographs\nare your worst.",
    author: "Henri Cartier-Bresson",
  },
  {
    text: "To photograph is to hold one's breath,\nwhen all faculties converge.",
    author: "Henri Cartier-Bresson",
  },
  {
    text: "Photography is the simplest thing\nin the world, but it is incredibly complicated.",
    author: "Martin Parr",
  },
  {
    text: "Taking pictures is savoring life\nintensely, every hundredth of a second.",
    author: "Marc Riboud",
  },
  {
    text: "Landscape photography is the supreme test\nof the photographer.",
    author: "Ansel Adams",
  },
];

// ── MOOD BACKGROUND TINTS ─────────────────────────────────────────────────────
// Extremely subtle — barely perceptible background shift.
const moodBg = {
  cold:    "#ECF0F2",
  warm:    "#F2EDE4",
  cool:    "#EBEDF0",
  neutral: "#F0EDE8",
};

// ────────────────────────────────────────────────────────────────────────────
// SEED SYSTEM
// The seed is the Vienna date string (YYYY-MM-DD).
// Before 06:00 Vienna time → use yesterday's date.
// This makes each day's prompt identical for all users.
// ────────────────────────────────────────────────────────────────────────────

function getViennaDateString() {
  const now = new Date();
  const viennaStr = now.toLocaleString('en-CA', {
    timeZone: 'Europe/Vienna',
    hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
  const [datePart, timePart] = viennaStr.split(', ');
  const [year, month, day] = datePart.split('-').map(Number);
  const [hour] = timePart.split(':').map(Number);
  // Before 06:00 → still showing yesterday's prompt
  if (hour < 6) {
    const d = new Date(Date.UTC(year, month - 1, day - 1));
    return d.toISOString().slice(0, 10);
  }
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

// Seeded RNG: djb2 hash → LCG sequence
// Same seed always produces same sequence.
function makeRng(seed) {
  let hash = 5381;
  for (let i = 0; i < seed.length; i++) {
    hash = ((hash << 5) + hash) + seed.charCodeAt(i);
    hash |= 0;
  }
  return function() {
    hash = Math.imul(1664525, hash) + 1013904223 | 0;
    return (hash >>> 0) / 0xFFFFFFFF;
  };
}

function seededPick(arr, rng) {
  return arr[Math.floor(rng() * arr.length)];
}

// ── GENERATE TODAY'S PROMPT ───────────────────────────────────────────────────
function generateToday() {
  const seed = getViennaDateString();
  const rng  = makeRng(seed);

  const subject     = seededPick(subjects, rng);
  const lighting    = seededPick(lightings, rng);
  const perspective = seededPick(perspectives, rng);
  const composition = seededPick(compositions, rng);
  const reflection  = seededPick(reflections, rng);
  const quote       = seededPick(quotes, rng);

  // Build sentence: alternate between using perspective or composition
  // as the fourth line, based on seed to keep it varied day to day.
  const useComposition = rng() > 0.45;
  const fourthLine = useComposition ? composition : perspective;

  return {
    sentence: `Fotografiere heute\n${subject}\n${lighting.phrase}\n${fourthLine}.`,
    reflection,
    quote,
    mood: lighting.mood,
    seed,
  };
}

// ────────────────────────────────────────────────────────────────────────────
// TIMER — seconds until next 06:00 Vienna
// ────────────────────────────────────────────────────────────────────────────

function getSecondsUntilNext6() {
  const now = new Date();
  const viennaStr = now.toLocaleString('en-CA', {
    timeZone: 'Europe/Vienna',
    hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  const [datePart, timePart] = viennaStr.split(', ');
  const [year, month, day]   = datePart.split('-').map(Number);
  const [hour, minute, sec]  = timePart.split(':').map(Number);

  const decimal = hour + minute / 60 + sec / 3600;

  // Target: next 06:00 — today if before 06:00, otherwise tomorrow
  let tYear = year, tMonth = month, tDay = day;
  if (decimal >= 6) {
    const t = new Date(Date.UTC(year, month - 1, day + 1));
    tYear  = t.getUTCFullYear();
    tMonth = t.getUTCMonth() + 1;
    tDay   = t.getUTCDate();
  }

  // Find Vienna UTC offset at target date (around 05:00 UTC to avoid edge cases)
  const sample       = new Date(Date.UTC(tYear, tMonth - 1, tDay, 5, 0, 0));
  const sampleVienna = new Date(sample.toLocaleString('en-US', { timeZone: 'Europe/Vienna' }));
  const offsetHours  = -(sample - sampleVienna) / 3_600_000; // e.g. 2 in CEST
  const utcHour      = 6 - offsetHours;                      // e.g. 4 in CEST

  const next6 = new Date(Date.UTC(tYear, tMonth - 1, tDay, utcHour, 0, 0));
  return Math.max(0, Math.floor((next6 - now) / 1000));
}

function formatTimer(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

function formatDateLabel(seedStr) {
  // seedStr: "2026-05-25" → "25. Mai 2026"
  const [y, mo, d] = seedStr.split('-').map(Number);
  const months = ["Januar","Februar","März","April","Mai","Juni",
                  "Juli","August","September","Oktober","November","Dezember"];
  return `${d}. ${months[mo - 1]} ${y}`;
}

// ────────────────────────────────────────────────────────────────────────────
// DOM
// ────────────────────────────────────────────────────────────────────────────

const $prompt     = document.getElementById('prompt');
const $reflection = document.getElementById('reflection');
const $quoteText  = document.getElementById('quote-text');
const $quoteAuth  = document.getElementById('quote-author');
const $timer      = document.getElementById('timer');
const $dateLabel  = document.getElementById('date-label');
const $wrap       = document.getElementById('prompt-wrap');

function nl2br(str) {
  return str.split('\n').join('<br>');
}

function render(data) {
  $prompt.innerHTML     = nl2br(data.sentence);
  $reflection.innerHTML = nl2br(data.reflection);
  $quoteText.innerHTML  = nl2br(data.quote.text);
  $quoteAuth.textContent = data.quote.author;
  $dateLabel.textContent = formatDateLabel(data.seed);

  // Mood tint
  const bg = moodBg[data.mood] || moodBg.neutral;
  document.body.style.background = bg;
  document.documentElement.style.background = bg;
}

// ── TIMER LOOP ────────────────────────────────────────────────────────────────
let lastSeed = null;

function tick() {
  const secs = getSecondsUntilNext6();
  $timer.textContent = formatTimer(secs);

  // If the seed changed (new day crossed 06:00) → refresh prompt
  const newSeed = getViennaDateString();
  if (newSeed !== lastSeed) {
    lastSeed = newSeed;
    const data = generateToday();

    if (lastSeed !== null) {
      // Animate transition for day rollover
      $wrap.classList.add('out');
      setTimeout(() => {
        render(data);
        $wrap.classList.remove('out');
      }, 550);
    } else {
      render(data);
    }
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
